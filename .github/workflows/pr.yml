name: PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  issues: read
  pull-requests: write

jobs:
  check-pr:
    name: Check PR
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
        with:
          # changeset status --since needs history to find the merge base
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: bun install
      - run: bunx scripts verify-pr ${{ github.event.pull_request.number }} --since ${{ github.event.pull_request.base.sha }}
        env:
          GH_TOKEN: ${{ github.token }}
